name: Refresh Job Listings

on:
  repository_dispatch:
    types: [refresh-jobs]
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-docx reportlab

      - name: Fetch job listings and update HTML
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python3 scripts/fetch_jobs.py

      - name: Generate tailored PDFs
        run: python3 scripts/gen_resumes.py

      - name: Commit and push updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Jagriti_Job_Listings.html resumes/
          git diff --staged --quiet || git commit -m "Refresh job listings $(date '+%Y-%m-%d %H:%M UTC')"
          git push
